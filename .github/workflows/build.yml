name: Build Proximity

on:
  release:
    types: [created]

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install customtkinter pyinstaller

      - name: Download yt-dlp
        run: curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe -o yt-dlp.exe

      - name: Download ffmpeg
        run: |
          curl -L https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip -o ffmpeg.zip
          tar -xf ffmpeg.zip
          copy ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe ffmpeg.exe

      - name: Build exe
        run: python -m PyInstaller --onefile --windowed --name proximity --add-binary "yt-dlp.exe;." --add-binary "ffmpeg.exe;." ytdl.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/proximity.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install customtkinter pyinstaller

      - name: Install ffmpeg and yt-dlp
        run: brew install ffmpeg yt-dlp

      - name: Build app
        run: |
          cp $(which yt-dlp) yt-dlp
          cp $(which ffmpeg) ffmpeg
          chmod +x yt-dlp ffmpeg
          python -m PyInstaller --onefile --windowed --name proximity \
            --add-binary "yt-dlp:." \
            --add-binary "ffmpeg:." \
            ytdl.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/proximity
