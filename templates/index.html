<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Downloader</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; }
    input, select, button { padding: 10px; margin: 10px 0; width: 100%; }
    button { background: #FF0000; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🎥 YouTube Video Downloader</h1>
  
  <form id="downloadForm">
    <input type="text" id="url" placeholder="Paste YouTube URL here" required>
    <select id="quality">
      <option value="720p">720p</option>
      <option value="1080p">1080p</option>
      <option value="1440p">1440p</option>
      <option value="2160p">4K (2160p)</option>
    </select>
    <button type="submit">Download</button>
  </form>

  <div id="status"></div>

  <script>
    document.getElementById('downloadForm').onsubmit = async (e) => {
      e.preventDefault();
      const url = document.getElementById('url').value;
      const quality = document.getElementById('quality').value;
      
      const res = await fetch('/download', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: `url=${encodeURIComponent(url)}&quality=${quality}`
      });
      
      const data = await res.json();
      document.getElementById('status').innerHTML = 
        `<p>Downloading: <strong>${data.title || 'Video'}</strong></p>`;
    };
  </script>
</body>
</html>
